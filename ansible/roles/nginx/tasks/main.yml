---
- name: Instala Nginx
  apt:
    name: nginx
    state: present

- name: Cria página de boas-vindas
  copy:
    dest: /var/www/html/index.html
    content: |
      <h1>{{ mensagem_boas_vindas }}</h1>
      <p>Servidor: {{ ansible_hostname }}</p>
    owner: www-data
  notify: restart nginx

- name: Garante que o Nginx está rodando
  service:
    name: nginx
    state: started
    enabled: yes